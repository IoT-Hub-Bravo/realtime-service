name: ${COMPOSE_PROJECT_NAME:-realtime-service}

services:
  realtime:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    ports:
      - "8003:8000"
    networks:
      - iot-hub-nw
    restart: unless-stopped

networks:
  iot-hub-nw:
    external: true
